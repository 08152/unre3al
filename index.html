<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Mini Unity 3D Engine</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =========================
     TOP TOOLBAR (Unity Style)
========================= -->
<div id="topbar">
    <button onclick="running = true">▶ Play</button>
    <button onclick="running = false">⏸ Pause</button>
    <button onclick="location.reload()">⏹ Stop</button>

    <span id="state" style="margin-left:10px;">Idle</span>
</div>

<!-- =========================
     MAIN EDITOR LAYOUT
========================= -->
<div id="container">

    <!-- LEFT: HIERARCHY -->
    <div id="hierarchy">
        <h3>Hierarchy</h3>
    </div>

    <!-- CENTER: GAME VIEW -->
    <div id="gameview">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- RIGHT: INSPECTOR -->
    <div id="inspector">
        <h3>Inspector</h3>
        <p>No Selection</p>
    </div>

</div>

<!-- =========================
     CONSOLE
========================= -->
<div id="console"></div>

<!-- =========================
     ENGINE
========================= -->
<script src="engine.js"></script>

</body>
</html>
