<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Runner (Offline & Single File)</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0e14;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 3vh;
        }
        #hud {
            color: #ffffff;
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: bold;
            font-family: monospace;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 10px;
        }
        #progress-container {
            width: 50%;
            max-width: 400px;
            min-width: 200px;
            height: 14px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 2px solid #ffffff;
            border-radius: 7px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00ffcc, #00ff88);
            box-shadow: 0 0 8px #00ffcc;
        }
        #win-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffcc;
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0,255,204,0.6), 4px 4px 0px rgba(0,0,0,0.8);
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div id="hud">X: 0.0 | Y: 0.0</div>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="win-screen">GESCHAFFT!</div>
    </div>

    <!-- AUDIO-SYSTEM VORBEREITUNG -->
    <!-- Um Musik hinzuzufügen, entferne die Kommentare unterhalb und passe das 'src'-Attribut an -->
    <!-- <audio id="bgMusic" loop src="deine_musik_datei.mp3"></audio> -->

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI-Referenzen
        const hud = document.getElementById('hud');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const winScreen = document.getElementById('win-screen');
        const bgMusic = document.getElementById('bgMusic');

        // Canvas an Bildschirmgröße anpassen
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Audio-Aktivierung bei Interaktion (Browser-Restriktion umgehen)
        function startMusic() {
            if (bgMusic && bgMusic.paused) {
                bgMusic.volume = 0.4;
                bgMusic.play().catch(e => console.log("Audio wartet auf Interaktion"));
            }
        }

        // --- PHYSIK & SPIELKONFIGURATION ---
        const GAME_SPEED = 8; 
        const GRAVITY = 0.75;
        const JUMP_FORCE = -15;
        const TARGET_SCORE_X = 6000; // Distanz bis 100% geschafft ist

        // Globale Spielvariablen
        let cameraX = 0;
        let isWon = false;

        // --- ENTITÄTEN ---
        const player = {
            x: 100,
            y: 0,
            size: 50,
            velocityY: 0,
            isGrounded: false,
            rotation: 0,
            targetRotation: 0,
            groundY: 0, // Dynamisch berechnet basierend auf Screen-Height

            update() {
                this.groundY = canvas.height * 0.75 - this.size;

                if (!isWon) {
                    this.x += GAME_SPEED; // Automatisches Laufen

                    // Sprungphysik & Gravitation
                    this.velocityY += GRAVITY;
                    this.y += this.velocityY;

                    // Bodenkollision
                    if (this.y >= this.groundY) {
                        if (!this.isGrounded) {
                            createLandingParticles(this.x + this.size/2, this.groundY + this.size);
                        }
                        this.y = this.groundY;
                        this.velocityY = 0;
                        this.isGrounded = true;
                        
                        // Im Original richtet sich der Würfel flach auf dem Boden aus (nächster 90°-Schritt)
                        this.rotation = Math.round(this.rotation / (Math.PI / 2)) * (Math.PI / 2);
                        this.targetRotation = this.rotation;
                    } else {
                        // Rotation in der Luft (90 Grad pro Sprungphase, sanft drehend)
                        this.rotation += 0.08;
                    }
                } else {
                    // Auslaufen nach dem Sieg
                    this.x += GAME_SPEED * 0.2;
                    if (this.y < this.groundY) {
                        this.velocityY += GRAVITY;
                        this.y += this.velocityY;
                    } else {
                        this.y = this.groundY;
                        this.rotation = Math.round(this.rotation / (Math.PI / 2)) * (Math.PI / 2);
                    }
                }
            },

            jump() {
                if (this.isGrounded && !isWon) {
                    this.velocityY = JUMP_FORCE;
                    this.isGrounded = false;
                    createJumpParticles(this.x + this.size/2, this.groundY + this.size);
                }
            },

            draw() {
                ctx.save();
                // Verschiebe Ursprung in die Mitte des Würfels für korrekte Rotation
                ctx.translate(this.x - cameraX + this.size / 2, this.y + this.size / 2);
                ctx.rotate(this.rotation);

                // Äußerer goldener/gelber Würfelkörper (Geometry Dash Original-Look)
                ctx.fillStyle = '#ffeb3b';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 4;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.strokeRect(-this.size / 2, -this.size / 2, this.size, this.size);

                // Innerer Deko-Quadrat/Gesichtsschutz
                ctx.fillStyle = '#00e5ff';
                ctx.fillRect(-this.size / 4, -this.size / 4, this.size / 2, this.size / 2);
                ctx.strokeRect(-this.size / 4, -this.size / 4, this.size / 2, this.size / 2);

                ctx.restore();
            },

            drawShadow() {
                // Dynamischer Schattenwurf auf den Boden
                let distanceFromGround = this.groundY - this.y;
                let scale = Math.max(0.2, 1 - (distanceFromGround / 300));
                let shadowWidth = this.size * scale;
                let shadowHeight = 8 * scale;

                ctx.save();
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.ellipse(
                    this.x - cameraX + this.size / 2, 
                    this.groundY + this.size, 
                    shadowWidth / 2, 
                    shadowHeight, 
                    0, 0, 2 * Math.PI
                );
                ctx.fill();
                ctx.restore();
            }
        };

        // --- PARTIKEL SYSTEM ---
        let particles = [];
        class Particle {
            constructor(x, y, color, vx, vy, size, life) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.size = size;
                this.maxLife = life;
                this.life = life;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillRect(this.x - cameraX, this.y, this.size, this.size);
                ctx.restore();
            }
        }

        function createJumpParticles(x, y) {
            for(let i=0; i<12; i++) {
                particles.push(new Particle(
                    x, y, '#00ffcc', 
                    (Math.random() - 0.5) * 4 - 2, 
                    (Math.random() - 1) * 3, 
                    Math.random() * 5 + 3, 30
                ));
            }
        }

        function createLandingParticles(x, y) {
    for (let i = 0; i < 10; i++) {
        particles.push(
            new Particle(
                x,
                y,
                '#ffeb3b',
                (Math.random() - 0.5) * 6,
                (Math.random() - 0.5) * 2,
                Math.random() * 4 + 2,
                20
            )
        );
    }
}
// --- EINGABE-STEUERUNG (PC & MOBIL) ---
function triggerJump(e) {
    if (e.type === 'keydown' && e.code !== 'Space') return;
    e.preventDefault();
    startMusic();
    player.jump();
}

window.addEventListener('keydown', triggerJump);
window.addEventListener('mousedown', triggerJump);
window.addEventListener('touchstart', triggerJump, { passive: false });

// --- GAME LOOP ---
function updateAndRender() {

    // Spiellogik
    player.update();

    // Kamera
    let targetCameraX = player.x - 150;
    cameraX += (targetCameraX - cameraX) * 0.1;

    // Fortschritt
    let currentProgress = Math.min((player.x / TARGET_SCORE_X) * 100, 100);
    progressBar.style.width = currentProgress + "%";

    hud.innerHTML =
        `X: ${(player.x / 50).toFixed(1)} | Y: ${((player.groundY - player.y) / 50).toFixed(1)}`;

    if (currentProgress >= 100 && !isWon) {
        isWon = true;
        progressContainer.style.display = "none";
        winScreen.style.display = "block";
    }

    particles = particles.filter(p => {
        p.update();
        return p.life > 0;
    });

    // ---------------- RENDERING ----------------

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Hintergrund
    ctx.fillStyle = "#0f131c";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Berge
    ctx.fillStyle = "#171d2a";
    for (let i = 0; i < 20; i++) {

        let pX = (i * 400) - (cameraX * 0.2) % 400;

        ctx.beginPath();
        ctx.moveTo(pX, canvas.height * 0.75);
        ctx.lineTo(pX + 200, canvas.height * 0.35);
        ctx.lineTo(pX + 400, canvas.height * 0.75);
        ctx.closePath();
        ctx.fill();
    }

    // Gebäude
    ctx.fillStyle = "#21293a";

    for (let i = 0; i < 30; i++) {

        let pX = (i * 250) - (cameraX * 0.5) % 250;

        ctx.fillRect(
            pX,
            canvas.height * 0.55,
            120,
            canvas.height * 0.2
        );
    }

    // Schatten
    player.drawShadow();

    // Boden
    ctx.fillStyle = "#001922";
    ctx.fillRect(
        0,
        canvas.height * 0.75,
        canvas.width,
        canvas.height * 0.25
    );

    // Gitter
    ctx.strokeStyle = "#00ffcc";
    ctx.lineWidth = 2;

    ctx.beginPath();

    let startGridX = Math.floor(cameraX / 60) * 60;

    for (let x = startGridX; x < startGridX + canvas.width + 120; x += 60) {

        ctx.moveTo(x - cameraX, canvas.height * 0.75);
        ctx.lineTo(x - cameraX, canvas.height);
    }

    ctx.moveTo(0, canvas.height * 0.75);
    ctx.lineTo(canvas.width, canvas.height * 0.75);

    ctx.moveTo(0, canvas.height * 0.77);
    ctx.lineTo(canvas.width, canvas.height * 0.77);

    ctx.stroke();

    // Partikel
    particles.forEach(p => p.draw());

    // Spieler
    player.draw();

    requestAnimationFrame(updateAndRender);
}

// Spielstart
requestAnimationFrame(updateAndRender);
